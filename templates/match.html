<!DOCTYPE html>
<html>
<head>
    <title>Matches Found</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            text-align: center;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
            width: 350px;
        }

        .item {
            background: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }

        img {
            width: 100%;
            border-radius: 8px;
        }

        button {
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔍 Matching Items</h2>

    {% if matches %}
        {% for item in matches %}
            <div class="item">
                <h3>{{ item.item }}</h3>
                <p>{{ item.description }}</p>
                <p><b>Contact:</b> {{ item.phone }}</p>

                {% if item.image %}
                    <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
                {% endif %}
            </div>
        {% endfor %}
    {% else %}
        <p>No matches found 😢</p>
    {% endif %}

    <a href="/">
        <button>Go Home</button>
    </a>
</div>

</body>
</html>
