<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            color: white;
            text-align: center;
        }

        .header {
            font-size: 28px;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: auto;
        }

        .item {
            background: white;
            color: black;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            text-align: left;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .delete-btn {
            background: red;
            color: white;
            padding: 8px;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="header">Search Results 🔍</div>

<a href="/">
    <button>⬅ Back</button>
</a>

<div class="container">

{% if items %}
    {% for item in items %}
        <div class="item">

            {% if item.image %}
                <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
            {% endif %}

            <h3>{{ item.item }}</h3>
            <p>{{ item.description }}</p>
            <p><b>Name:</b> {{ item.name }}</p>
            <p><b>Phone:</b> {{ item.phone }}</p>

            <a href="/delete/{{ item.id }}">
                <button class="delete-btn">Delete</button>
            </a>

        </div>
    {% endfor %}
{% else %}
    <p>No items found 😢</p>
{% endif %}

</div>

</body>
</html>
