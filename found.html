<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #74ebd5, #9face6);

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .item {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Search Results</h2>

    {% if items %}
        {% for item in items %}
            <div class="item">
                <h3>{{ item.title }}</h3>
                <p>{{ item.description }}</p>
                <p>{{ item.location }}</p>
                <img src="{{ url_for('static', filename='uploads/' + item.image) }}">
            </div>
        {% endfor %}
    {% else %}
        <p>No items found 😢</p>
    {% endif %}
</div>

</body>
</html>
